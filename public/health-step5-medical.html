<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Medical History - Ecobank MaaS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-container": "#1e398a",
                    "secondary": "#4159ab",
                    "surface-tint": "#316383",
                    "surface-dim": "#d0daf1",
                    "surface-container-high": "#dee8ff",
                    "on-primary-fixed": "#001e2e",
                    "on-surface": "#121c2c",
                    "surface-container-low": "#f0f3ff",
                    "error-container": "#ffdad6",
                    "tertiary-fixed": "#b1f0d1",
                    "primary-fixed-dim": "#9cccf0",
                    "on-secondary-fixed": "#001550",
                    "inverse-on-surface": "#ecf1ff",
                    "surface-container": "#e7eeff",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed-variant": "#0f513a",
                    "eco-lime": "#BED600",
                    "error": "#ba1a1a",
                    "tertiary-container": "#004731",
                    "deep-navy": "#023448",
                    "background": "#f9f9ff",
                    "on-background": "#121c2c",
                    "primary-container": "#004260",
                    "primary": "#004260",
                    "secondary-fixed": "#dce1ff",
                    "on-surface-variant": "#41484d",
                    "on-primary": "#ffffff",
                    "inverse-primary": "#9cccf0",
                    "on-primary-container": "#7eaed1",
                    "surface": "#f9f9ff",
                    "border-subtle": "#E5E5E5",
                    "tertiary-fixed-dim": "#96d4b6",
                    "inverse-surface": "#273142",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#f9f9ff",
                    "on-secondary": "#ffffff",
                    "surface-gray": "#F8F8F8",
                    "on-secondary-fixed-variant": "#274192",
                    "on-error": "#ffffff",
                    "success-teal": "#00C58F",
                    "outline": "#71787e",
                    "on-primary-fixed-variant": "#124b6a",
                    "outline-variant": "#c1c7ce",
                    "secondary-fixed-dim": "#b6c4ff",
                    "surface-container-highest": "#d9e3f9",
                    "on-tertiary-fixed": "#002115",
                    "secondary-container": "#90a7ff",
                    "tertiary": "#002e1f",
                    "primary-fixed": "#c8e6ff",
                    "surface-variant": "#d9e3f9",
                    "on-tertiary-container": "#78b599",
                    "on-error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "20px",
                    "container-max": "1200px",
                    "base": "8px",
                    "stack-lg": "48px",
                    "margin-desktop": "40px",
                    "stack-sm": "12px",
                    "stack-md": "24px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "display-lg": ["Hanken Grotesk"],
                    "title-md": ["Hanken Grotesk"],
                    "label-lg": ["Hanken Grotesk"],
                    "badge-xs": ["Hanken Grotesk"],

                    "headline-lg": ["Hanken Grotesk"],

            },
            "fontSize": {
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "badge-xs": ["10px", {"lineHeight": "12px", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Hanken Grotesk', sans-serif; margin: 0; padding: 0; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Pill checkbox styling */
        .condition-pill input:checked + label {
            border-color: #004260;
            background-color: #f0f3ff;
            box-shadow: 0 0 0 1px #004260;
        }
        .condition-pill input:checked + label .pill-check {
            background-color: #004260;
            border-color: #004260;
        }
        .condition-pill input:checked + label .pill-check .material-symbols-outlined {
            opacity: 1;
        }

        /* None-of-these special checked style */
        #cond-none:checked + label {
            border-color: #00C58F;
            background-color: #f0fff8;
            box-shadow: 0 0 0 1px #00C58F;
        }
        #cond-none:checked + label .pill-check {
            background-color: #00C58F;
            border-color: #00C58F;
        }

        /* removed cramped constraints */
    </style>
</head>
<body class="bg-background text-on-background flex flex-col">

<!-- Compact content wrapper that fills viewport minus footer -->
<div class="flex-1 px-6 py-8 max-w-[720px] mx-auto w-full flex flex-col">

    <!-- Slim step indicator -->
    <div class="flex items-center justify-center gap-3 mb-6 flex-shrink-0">
        <div class="h-[2px] flex-1 bg-success-teal rounded-full"></div>
        <span class="font-label-sm text-label-sm text-on-surface-variant whitespace-nowrap">Step 5 of 5</span>
        <div class="h-[2px] flex-1 bg-outline-variant rounded-full"></div>
    </div>

    <!-- Priority onboarding - single compact line -->
    <div class="flex items-center gap-2 bg-primary/5 border border-primary/15 rounded-lg px-4 py-3 mb-5 flex-shrink-0">
        <span class="material-symbols-outlined text-primary text-[16px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
        <span class="font-label-sm text-label-sm text-primary">Ecobank Gold Member &mdash; expedited medical underwriting with instant approval.</span>
    </div>

    <!-- Main card -->
    <div class="bg-surface-container-lowest rounded-xl border border-border-subtle shadow-sm p-6 relative flex-shrink-0">
        <!-- Eco-lime accent gradient bar -->
        <div class="absolute top-0 left-0 right-0 h-[2px]" style="background: #BED600;"></div>

        <h1 class="font-headline-lg text-headline-lg-mobile font-bold text-primary mb-2">Medical History</h1>
        <p class="font-body-md text-body-md text-on-surface-variant mb-5">Select any pre-existing conditions that apply to you.</p>

        <!-- Condition pills - 3 columns compact -->
        <div class="grid grid-cols-3 gap-3 mb-5" id="medical-checklist">
            <div class="condition-pill relative">
                <input class="peer hidden" id="cond-1" type="checkbox" value="diabetes"/>
                <label class="flex items-center gap-2.5 px-3.5 py-3 border border-border-subtle rounded-lg cursor-pointer transition-all hover:bg-surface-container-low text-[14px]" for="cond-1">
                    <div class="pill-check w-4 h-4 border-2 border-outline-variant rounded flex items-center justify-center flex-shrink-0 transition-all">
                        <span class="material-symbols-outlined text-white text-[12px] opacity-0 transition-all">check</span>
                    </div>
                    <span class="font-label-lg text-label-lg leading-tight">Diabetes</span>
                </label>
            </div>
            <div class="condition-pill relative">
                <input class="peer hidden" id="cond-2" type="checkbox" value="blood_pressure"/>
                <label class="flex items-center gap-2.5 px-3.5 py-3 border border-border-subtle rounded-lg cursor-pointer transition-all hover:bg-surface-container-low text-[14px]" for="cond-2">
                    <div class="pill-check w-4 h-4 border-2 border-outline-variant rounded flex items-center justify-center flex-shrink-0 transition-all">
                        <span class="material-symbols-outlined text-white text-[12px] opacity-0 transition-all">check</span>
                    </div>
                    <span class="font-label-lg text-label-lg leading-tight">High BP</span>
                </label>
            </div>
            <div class="condition-pill relative">
                <input class="peer hidden" id="cond-3" type="checkbox" value="heart_disease"/>
                <label class="flex items-center gap-2.5 px-3.5 py-3 border border-border-subtle rounded-lg cursor-pointer transition-all hover:bg-surface-container-low text-[14px]" for="cond-3">
                    <div class="pill-check w-4 h-4 border-2 border-outline-variant rounded flex items-center justify-center flex-shrink-0 transition-all">
                        <span class="material-symbols-outlined text-white text-[12px] opacity-0 transition-all">check</span>
                    </div>
                    <span class="font-label-lg text-label-lg leading-tight">Heart Disease</span>
                </label>
            </div>
            <div class="condition-pill relative">
                <input class="peer hidden" id="cond-4" type="checkbox" value="asthma"/>
                <label class="flex items-center gap-2.5 px-3.5 py-3 border border-border-subtle rounded-lg cursor-pointer transition-all hover:bg-surface-container-low text-[14px]" for="cond-4">
                    <div class="pill-check w-4 h-4 border-2 border-outline-variant rounded flex items-center justify-center flex-shrink-0 transition-all">
                        <span class="material-symbols-outlined text-white text-[12px] opacity-0 transition-all">check</span>
                    </div>
                    <span class="font-label-lg text-label-lg leading-tight">Asthma</span>
                </label>
            </div>
            <div class="condition-pill relative">
                <input class="peer hidden" id="cond-5" type="checkbox" value="kidney_disease"/>
                <label class="flex items-center gap-2.5 px-3.5 py-3 border border-border-subtle rounded-lg cursor-pointer transition-all hover:bg-surface-container-low text-[14px]" for="cond-5">
                    <div class="pill-check w-4 h-4 border-2 border-outline-variant rounded flex items-center justify-center flex-shrink-0 transition-all">
                        <span class="material-symbols-outlined text-white text-[12px] opacity-0 transition-all">check</span>
                    </div>
                    <span class="font-label-lg text-label-lg leading-tight">Kidney Disease</span>
                </label>
            </div>
            <div class="condition-pill relative">
                <input class="peer hidden" id="cond-6" type="checkbox" value="cancer"/>
                <label class="flex items-center gap-2.5 px-3.5 py-3 border border-border-subtle rounded-lg cursor-pointer transition-all hover:bg-surface-container-low text-[14px]" for="cond-6">
                    <div class="pill-check w-4 h-4 border-2 border-outline-variant rounded flex items-center justify-center flex-shrink-0 transition-all">
                        <span class="material-symbols-outlined text-white text-[12px] opacity-0 transition-all">check</span>
                    </div>
                    <span class="font-label-lg text-label-lg leading-tight">Cancer</span>
                </label>
            </div>
        </div>

        <!-- None of these - inline -->
        <div class="condition-pill relative mb-5">
            <input class="peer hidden" id="cond-none" type="checkbox" value="none"/>
            <label class="flex items-center gap-2.5 px-3.5 py-3 border-2 border-dashed border-success-teal/40 rounded-lg cursor-pointer transition-all hover:bg-success-teal/5" for="cond-none">
                <div class="pill-check w-4 h-4 border-2 border-success-teal/50 rounded flex items-center justify-center flex-shrink-0 transition-all">
                    <span class="material-symbols-outlined text-white text-[12px] opacity-0 transition-all">check</span>
                </div>
                <span class="material-symbols-outlined text-success-teal text-[16px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                <span class="font-label-lg text-label-lg font-bold text-success-teal">None of these apply to me</span>
            </label>
        </div>

        <!-- WhatsApp toggle - compact inline -->
        <div class="flex items-center justify-between bg-surface-container-low rounded-lg px-4 py-3 border border-secondary-fixed">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-success-teal text-[18px]">chat</span>
                <span class="font-label-sm text-label-sm text-primary">WhatsApp updates for policy docs &amp; alerts</span>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
                <input checked="" class="sr-only peer" type="checkbox" value=""/>
                <div class="w-9 h-5 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-success-teal"></div>
            </label>
        </div>
    </div>

    <!-- Compact security line -->
    <div class="flex items-center gap-2 text-on-surface-variant mt-4 flex-shrink-0">
        <span class="material-symbols-outlined text-success-teal text-[14px]" style="font-variation-settings: 'FILL' 1;">encrypted</span>
        <span class="font-label-sm text-label-sm">AES-256 encrypted. Only shared with underwriters as needed.</span>
    </div>
</div>

<!-- Navigation Footer - always visible -->
<footer class="w-full bg-surface-container-lowest border-t border-border-subtle py-4 px-6 flex-shrink-0">
    <div class="max-w-[720px] mx-auto flex items-center justify-between">
        <button class="flex items-center gap-2 px-6 h-12 rounded-full text-primary font-label-lg border border-border-subtle hover:bg-surface-container-low transition-all active:scale-95" onclick="notifyParent('back')">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            Back
        </button>
        <button class="bg-primary text-on-primary px-8 h-12 rounded-full font-label-lg font-bold flex items-center gap-2 hover:bg-deep-navy shadow-md active:scale-95 transition-all" onclick="notifyParent('complete')">
            Save &amp; Continue
            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
        </button>
    </div>
</footer>

<!-- Script for Logic -->
<script>
        // Mutual exclusivity logic: If "None of these" is checked, uncheck others. If any other is checked, uncheck "None".
        const checkboxes = document.querySelectorAll('#medical-checklist input[type="checkbox"]');
        const noneCheckbox = document.getElementById('cond-none');

        checkboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                if (cb.checked) {
                    noneCheckbox.checked = false;
                }
            });
        });

        noneCheckbox.addEventListener('change', () => {
            if (noneCheckbox.checked) {
                checkboxes.forEach(cb => {
                    cb.checked = false;
                });
            }
        });

        // Simple animation on footer button hover
        const mainBtn = document.querySelector('footer .bg-primary');
        mainBtn.addEventListener('mouseenter', () => {
            mainBtn.querySelector('span').style.transform = 'translateX(4px)';
        });
        mainBtn.addEventListener('mouseleave', () => {
            mainBtn.querySelector('span').style.transform = 'translateX(0px)';
        });
    </script>
<script>
function notifyParent(action) {
  if (window.parent !== window) {
    window.parent.postMessage({ source: 'maas-health-wizard', action: action }, '*');
  }
}
</script>
<script>
(function() {
  function reportHeight() {
    window.parent.postMessage({ source: 'maas-iframe-resize', height: document.documentElement.scrollHeight }, '*');
  }
  if (window.parent !== window) {
    new ResizeObserver(reportHeight).observe(document.documentElement);
    setInterval(reportHeight, 500);
    reportHeight();
  }
})();
</script>

</body></html>

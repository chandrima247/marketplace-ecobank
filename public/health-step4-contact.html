<style>
        body { font-family: 'Hanken Grotesk', sans-serif; margin: 0; padding: 0; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        html, body { min-height: 0 !important; height: auto !important; overflow: hidden; }
    </style>
</head>
<body class="bg-surface text-on-surface">

<!-- Compact content wrapper -->
<div class="w-full max-w-lg mx-auto px-4 py-3">

<!-- Slim step indicator -->
<div class="flex items-center justify-center gap-2 mb-3">
    <div class="h-[2px] flex-1 bg-success-teal rounded-full"></div>
    <span class="font-label-sm text-label-sm text-on-surface-variant whitespace-nowrap">Step 4 of 4</span>
    <div class="h-[2px] flex-1 bg-outline-variant rounded-full"></div>
</div>

<!-- Main card -->
<div class="bg-surface-container-lowest rounded-xl border border-border-subtle shadow-sm p-4 relative overflow-hidden">
    <!-- Eco-lime accent gradient bar -->
    <div class="absolute top-0 left-0 right-0 h-[3px]" style="background: #BED600;"></div>

    <div class="relative z-10">
        <h1 class="font-headline-lg text-[22px] leading-7 font-bold text-primary mb-1">Almost there!</h1>
        <p class="font-label-sm text-label-sm text-on-surface-variant mb-3">We need your contact details to finalize your quotes.</p>

        <form>
            <!-- Two fields side by side -->
            <div class="grid grid-cols-2 gap-3 mb-3">
                <!-- Full Name -->
                <div class="space-y-1">
                    <label class="font-label-lg text-label-lg text-on-surface" for="full_name">Full Name</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[18px]">person</span>
                        <input class="w-full pl-9 pr-3 py-2.5 bg-surface rounded-lg border border-border-subtle focus:border-primary focus:ring-2 focus:ring-primary/30 outline-none transition-all font-body-md text-[14px]" id="full_name" placeholder="John Doe" type="text"/>
                    </div>
                </div>
                <!-- Phone Number -->
                <div class="space-y-1">
                    <label class="font-label-lg text-label-lg text-on-surface" for="phone">Phone Number</label>
                    <div class="flex gap-1.5">
                        <div class="relative w-[72px] flex-shrink-0">
                            <div class="absolute left-2 top-1/2 -translate-y-1/2 flex items-center gap-1">
                                <img alt="Uganda Flag" class="w-4 h-3 rounded-sm object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAjzssXgsCOarQko1yMal4emR8oG9nZR8X8i33iokbLrauKhI8QXq4Y1YBestyETA-RyOZF9aYVC2DFu6rykZN9yHeCba_Jzn-KL_WnQr9oRHTrybz4lbb_o9_gcQ5Bn6pd5WWEz_NMll_NdxiN2BnGinJxWBVZWqLjfCkbgk9HhHCTnelD6zhPumrxDo0EzVHllviqwv2pmaDuCMtfQlWEijKcuOFhCliKLAFMjy4WWi25KF1YcR-TVpIIjLgCguTAymNArYfF3Hk"/>
                                <span class="text-[12px]">+256</span>
                            </div>
                            <input class="w-full pl-[60px] pr-1 py-2.5 bg-surface-container-low rounded-lg border border-border-subtle outline-none cursor-not-allowed text-[14px]" disabled="" type="text" value=""/>
                        </div>
                        <div class="relative flex-grow">
                            <input class="w-full px-3 py-2.5 bg-surface rounded-lg border border-border-subtle focus:border-primary focus:ring-2 focus:ring-primary/30 outline-none transition-all text-[14px]" id="phone" placeholder="700 000 000" type="tel"/>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Compact security line -->
            <div class="flex items-center gap-2 text-on-surface-variant mb-3 py-1">
                <span class="material-symbols-outlined text-success-teal text-[16px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
                <span class="font-label-sm text-label-sm">Your data is secure &mdash; 256-bit encryption, used only for your quotes.</span>
            </div>

            <!-- CTA -->
            <button class="w-full py-3 bg-primary text-on-primary rounded-full font-bold text-[16px] flex items-center justify-center gap-2 hover:bg-deep-navy transition-all active:scale-95 shadow-md" type="button" onclick="notifyParent('next')">
                View Your Quotes
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
            <button class="w-full py-1.5 mt-1 text-on-surface-variant hover:text-primary font-label-lg text-label-lg underline transition-colors" type="button" onclick="notifyParent('back')">
                Back to Step 3
            </button>
        </form>
    </div>
</div>

</div>

<script>
        // Micro-interactions for form focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined')?.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined')?.classList.remove('text-primary');
            });
        });
    </script>
<script>
function notifyParent(action) {
  if (window.parent !== window) {
    window.parent.postMessage({ source: 'maas-health-wizard', action: action }, '*');
  }
}
</script>
<script>
(function() {
  function reportHeight() {
    window.parent.postMessage({ source: 'maas-iframe-resize', height: document.documentElement.scrollHeight }, '*');
  }
  if (window.parent !== window) {
    new ResizeObserver(reportHeight).observe(document.documentElement);
    setInterval(reportHeight, 500);
    reportHeight();
  }
})();
</script>

</body></html>

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MaaS Health Insurance - Member Ages</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#dce1ff",
                        "on-tertiary-container": "#78b599",
                        "surface": "#f9f9ff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#001e2e",
                        "primary": "#002b40",
                        "on-primary-fixed-variant": "#124b6a",
                        "inverse-surface": "#273142",
                        "surface-container-high": "#dee8ff",
                        "on-secondary-fixed": "#001550",
                        "surface-container-low": "#f0f3ff",
                        "on-background": "#121c2c",
                        "surface-dim": "#d0daf1",
                        "deep-navy": "#023448",
                        "on-tertiary-fixed-variant": "#0f513a",
                        "surface-gray": "#F8F8F8",
                        "background": "#f9f9ff",
                        "tertiary": "#002e1f",
                        "tertiary-fixed": "#b1f0d1",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#7eaed1",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#9cccf0",
                        "surface-tint": "#316383",
                        "on-primary": "#ffffff",
                        "surface-container": "#e7eeff",
                        "secondary-fixed-dim": "#b6c4ff",
                        "outline-variant": "#c1c7ce",
                        "error-container": "#ffdad6",
                        "primary-container": "#004260",
                        "eco-lime": "#BED600",
                        "success-teal": "#00C58F",
                        "on-secondary-fixed-variant": "#274192",
                        "secondary": "#4159ab",
                        "inverse-on-surface": "#ecf1ff",
                        "on-secondary-container": "#1e398a",
                        "surface-bright": "#f9f9ff",
                        "on-surface": "#121c2c",
                        "surface-variant": "#d9e3f9",
                        "on-tertiary-fixed": "#002115",
                        "tertiary-container": "#004731",
                        "error": "#ba1a1a",
                        "secondary-container": "#90a7ff",
                        "tertiary-fixed-dim": "#96d4b6",
                        "border-subtle": "#E5E5E5",
                        "primary-fixed": "#c8e6ff",
                        "surface-container-highest": "#d9e3f9",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#71787e",
                        "on-surface-variant": "#41484d",
                        "primary-fixed-dim": "#9cccf0",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "24px",
                        "gutter": "24px",
                        "stack-lg": "48px",
                        "base": "8px",
                        "stack-sm": "12px",
                        "container-max": "1200px",
                        "margin-mobile": "20px",
                        "margin-desktop": "40px"
                    },
                    "fontFamily": {
                        "title-md": ["Hanken Grotesk"],
                        "label-sm": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "label-lg": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "badge-xs": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "badge-xs": ["10px", {"lineHeight": "12px", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #f9f9ff;
            margin: 0;
            padding: 0;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        select.age-select {
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        select.age-select:focus {
            border-color: #004260 !important;
            box-shadow: 0 0 0 3px rgba(0, 66, 96, 0.12) !important;
        }
        html, body { min-height: 0 !important; height: auto !important; }
    </style>
</head>
<body>
<main class="px-4 pt-3 pb-2">
<div class="w-full max-w-[680px] mx-auto">
    <!-- Slim Step Indicator -->
    <div class="flex items-center gap-2 mb-3">
        <span class="text-[11px] font-bold text-primary uppercase tracking-wider">Step 2 of 4</span>
        <div class="flex-1 h-[3px] rounded-full bg-surface-container-high overflow-hidden">
            <div class="h-full w-2/4 bg-primary rounded-full"></div>
        </div>
    </div>

    <!-- Wizard Card -->
    <div class="bg-surface-container-lowest rounded-xl border border-border-subtle p-4 relative overflow-hidden">
        <!-- Eco-lime accent line at top -->
        <div class="absolute top-0 left-0 right-0 h-[2px] bg-[#BED600]"></div>

        <!-- Title -->
        <div class="mb-3">
            <h1 class="text-[18px] font-bold text-primary leading-tight">How old are the members?</h1>
            <p class="text-[12px] text-on-surface-variant mt-0.5">Age helps us provide accurate premium estimates.</p>
        </div>

        <!-- 3 member cards side by side -->
        <div class="grid grid-cols-3 gap-3 mb-4">
            <!-- Self -->
            <div class="border border-border-subtle rounded-lg p-3 flex flex-col items-center gap-2">
                <div class="w-9 h-9 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined text-[20px]">person</span>
                </div>
                <div class="text-center">
                    <p class="text-[13px] font-semibold text-on-surface">Self</p>
                    <p class="text-[10px] text-outline">Primary</p>
                </div>
                <div class="relative w-full">
                    <select class="age-select appearance-none w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-[14px] font-medium text-on-surface text-center focus:ring-2 focus:ring-primary/15 outline-none cursor-pointer">
                        <option>32</option>
                        <option>18-25</option>
                        <option>26-35</option>
                        <option>36-45</option>
                        <option>46-55</option>
                        <option>56+</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-outline pointer-events-none text-[16px]">expand_more</span>
                </div>
            </div>
            <!-- Spouse -->
            <div class="border border-border-subtle rounded-lg p-3 flex flex-col items-center gap-2">
                <div class="w-9 h-9 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined text-[20px]">group</span>
                </div>
                <div class="text-center">
                    <p class="text-[13px] font-semibold text-on-surface">Spouse</p>
                    <p class="text-[10px] text-outline">Dependent</p>
                </div>
                <div class="relative w-full">
                    <select class="age-select appearance-none w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-[14px] font-medium text-on-surface text-center focus:ring-2 focus:ring-primary/15 outline-none cursor-pointer">
                        <option>30</option>
                        <option>18-25</option>
                        <option>26-35</option>
                        <option>36-45</option>
                        <option>46-55</option>
                        <option>56+</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-outline pointer-events-none text-[16px]">expand_more</span>
                </div>
            </div>
            <!-- Son -->
            <div class="border border-border-subtle rounded-lg p-3 flex flex-col items-center gap-2">
                <div class="w-9 h-9 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined text-[20px]">child_care</span>
                </div>
                <div class="text-center">
                    <p class="text-[13px] font-semibold text-on-surface">Son</p>
                    <p class="text-[10px] text-outline">Dependent</p>
                </div>
                <div class="relative w-full">
                    <select class="age-select appearance-none w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-[14px] font-medium text-on-surface text-center focus:ring-2 focus:ring-primary/15 outline-none cursor-pointer">
                        <option>5</option>
                        <option>0-2</option>
                        <option>3-12</option>
                        <option>13-17</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-outline pointer-events-none text-[16px]">expand_more</span>
                </div>
            </div>
        </div>

        <!-- CTA buttons -->
        <div class="flex items-center gap-3 pt-3 border-t border-border-subtle">
            <button class="px-6 py-2.5 bg-transparent text-primary rounded-lg font-semibold text-[13px] border border-outline-variant hover:bg-surface-container-low transition-all flex items-center gap-1" onclick="notifyParent('back')">
                <span class="material-symbols-outlined text-[16px]">arrow_back</span>
                Back
            </button>
            <button class="flex-1 py-2.5 bg-primary text-white rounded-lg font-bold text-[14px] hover:bg-deep-navy transition-all flex items-center justify-center gap-2 shadow-md" onclick="notifyParent('next')">
                Next: Your Location
                <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
            </button>
        </div>
    </div>
</div>
</main>
<script>
        // Simple Interaction logic
        document.querySelectorAll('select').forEach(select => {
            select.addEventListener('change', function() {
                this.parentElement.parentElement.classList.add('bg-primary-container/5');
                setTimeout(() => {
                    this.parentElement.parentElement.classList.remove('bg-primary-container/5');
                }, 300);
            });
        });
    </script>
<script>
function notifyParent(action) {
  if (window.parent !== window) {
    window.parent.postMessage({ source: 'maas-health-wizard', action: action }, '*');
  }
}
</script>
<script>
(function() {
  function reportHeight() {
    window.parent.postMessage({ source: 'maas-iframe-resize', height: document.documentElement.scrollHeight }, '*');
  }
  if (window.parent !== window) {
    new ResizeObserver(reportHeight).observe(document.documentElement);
    setInterval(reportHeight, 500);
    reportHeight();
  }
})();
</script>

</body></html>

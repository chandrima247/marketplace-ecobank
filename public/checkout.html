<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --britam: #0F74BC; --britam-dark: #0a5a93; }
  html, body { height: 100%; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f6f7; color: #1f2d36; -webkit-font-smoothing: antialiased; }
  button, input { font-family: inherit; }
  .shell { max-width: 430px; margin: 0 auto; min-height: 100%; background: #fff; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 60px -30px rgba(0,0,0,.25); }
  .hdr { background: var(--britam); color: #fff; padding: 16px 18px 22px; position: relative; }
  .hdr-row { display: flex; align-items: center; justify-content: space-between; }
  .hdr h1 { flex: 1; text-align: center; font-size: 22px; font-weight: 700; }
  .icon-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: #fff; background: none; border: none; cursor: pointer; }
  .scallop { height: 12px; background-color: var(--britam); background-image: radial-gradient(circle 7px at 8px 12px, #fff 7px, transparent 8px); background-size: 16px 12px; background-repeat: repeat-x; }
  .merchant-logo { position: absolute; left: 50%; transform: translateX(-50%); bottom: -26px; width: 64px; height: 64px; border-radius: 14px; background: #fff; box-shadow: 0 4px 14px -4px rgba(0,0,0,.25); display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--britam); font-size: 15px; z-index: 5; }
  .body { flex: 1; padding: 44px 18px 18px; overflow-y: auto; }
  .sec-title { display: flex; align-items: center; justify-content: space-between; margin: 14px 2px 12px; }
  .sec-title b { font-size: 15px; font-weight: 700; }
  .timer { font-size: 13px; color: #5b6578; display: flex; align-items: center; gap: 6px; }
  .wallet { border: 1.5px solid var(--britam); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .wallet .logo { width: 30px; height: 30px; border-radius: 7px; background: #ED1C24; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
  .wallet .num { flex: 1; font-size: 15px; font-weight: 600; }
  .check { color: var(--britam); }
  .add-title { font-size: 14px; font-weight: 700; margin: 22px 2px 10px; }
  .accordion { border-top: 1px solid #eef0f1; padding-top: 16px; }
  .acc-head { display: flex; align-items: center; gap: 10px; color: var(--britam); font-weight: 700; font-size: 15px; }
  .mm-fields { display: flex; gap: 10px; margin-top: 14px; }
  .phone { flex: 1; display: flex; align-items: center; border: 1px solid #d8dee2; border-radius: 10px; padding: 0 12px; background: #f8fafb; }
  .phone .cc { font-size: 13px; color: #5b6578; padding-right: 8px; border-right: 1px solid #e0e5e8; margin-right: 8px; }
  .phone input { flex: 1; border: none; outline: none; background: none; font-size: 14px; padding: 12px 0; }
  .otp { width: 120px; border: 1px solid #d8dee2; border-radius: 10px; padding: 12px; font-size: 14px; outline: none; text-align: center; }
  .otp:focus, .phone input:focus { }
  .otp-hint { text-align: right; font-size: 11px; color: #e08a00; margin-top: 6px; }
  .otp-hint b { color: #1f2d36; cursor: pointer; }
  .footer-bar { border-top: 1px solid #eef0f1; padding: 14px 18px; display: flex; align-items: center; gap: 14px; background: #fff; }
  .amt { line-height: 1.1; }
  .amt .v { font-size: 18px; font-weight: 800; } .amt .v small { color: var(--britam); font-weight: 700; }
  .amt .d { font-size: 11px; color: #9aa6ad; }
  .proceed { flex: 1; background: var(--britam); color: #fff; border: none; border-radius: 10px; padding: 15px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .proceed:hover { background: var(--britam-dark); }
  .powered { text-align: center; font-size: 10px; color: #9aa6ad; padding: 8px; }
  .overlay { position: absolute; inset: 0; background: rgba(255,255,255,.92); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 20; }
  .spinner { width: 42px; height: 42px; border: 4px solid #e0e5e8; border-top-color: var(--britam); border-radius: 999px; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="hdr-row">
      <button class="icon-btn" id="backBtn" aria-label="Back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
      <h1 id="merchantName">Britam</h1>
      <span class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg></span>
    </div>
  </div>
  <div class="scallop"></div>
  <div class="merchant-logo" id="merchantLogo">BR</div>

  <div class="body">
    <div class="sec-title">
      <b>Pay with Wallet</b>
      <span class="timer"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> <span id="payTimer">03:56</span></span>
    </div>

    <div class="wallet">
      <span class="logo">AIR</span>
      <span class="num">AIRTEL &nbsp; XXXXX1215</span>
      <span class="check"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
    </div>

    <div class="add-title">Add Another Wallet</div>
    <div class="accordion">
      <div class="acc-head">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
        <span style="flex:1;">Mobile Money</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
      </div>
      <div class="mm-fields">
        <div class="phone"><span class="cc">+256</span><input id="phone" value="740028800" inputmode="numeric"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9aa6ad" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor:pointer;" id="clearPhone"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg></div>
        <input class="otp" id="otp" placeholder="Enter OTP" inputmode="numeric">
      </div>
      <div class="otp-hint"><span id="otpTimer">00:26</span> OTP not received? <b id="sendAgain">Send Again</b></div>
    </div>
  </div>

  <div class="footer-bar">
    <div class="amt"><div class="v"><small id="cur">UGX</small> <span id="amount">485,000</span></div><div class="d">Details</div></div>
    <button class="proceed" id="proceedBtn">Proceed</button>
  </div>
  <div class="powered">Powered by nxtpe</div>

  <div class="overlay" id="overlay">
    <div class="spinner"></div>
    <div style="font-size:14px;color:#5b6578;font-weight:600;">Confirming payment…</div>
  </div>
</div>

<script src="/flow-config.js"></script>
<script>
  var AMOUNTS = { 'Britam': '485,000', 'ICEA Lion': '542,000', 'Old Mutual': '720,000' };
  var state = { provider: 'Britam', amount: '485,000' };

  function applyInit(d) {
    if (d.provider) {
      state.provider = d.provider;
      document.getElementById('merchantName').textContent = d.provider;
      document.getElementById('merchantLogo').textContent = d.provider.substring(0,2).toUpperCase();
      var key = Object.keys(AMOUNTS).find(function(k){ return d.provider.toLowerCase().indexOf(k.toLowerCase().split(' ')[0]) !== -1; });
      if (key) state.amount = AMOUNTS[key];
    }
    if (d.amount) state.amount = d.amount;
    document.getElementById('amount').textContent = state.amount;
    if (window.MAAS) document.getElementById('cur').textContent = window.MAAS.currency();
    report();
  }

  function post(action, data) { if (window.parent !== window) window.parent.postMessage(Object.assign({ source: 'maas-checkout', action: action }, data || {}), '*'); }
  document.getElementById('backBtn').addEventListener('click', function(){ post('back'); });
  document.getElementById('clearPhone').addEventListener('click', function(){ document.getElementById('phone').value=''; });
  document.getElementById('proceedBtn').addEventListener('click', function(){
    // (USSD PIN prompt happens on the customer's phone — skipped here per design)
    document.getElementById('overlay').style.display = 'flex';
    setTimeout(function(){ post('paid', { provider: state.provider, amount: state.amount }); }, 1400);
  });

  window.addEventListener('message', function(e){ if (e.data && e.data.source === 'maas-checkout-init') applyInit(e.data); });

  // countdown for the pay timer
  (function(){ var t = 236; var el = document.getElementById('payTimer');
    setInterval(function(){ if (t<=0) return; t--; el.textContent = String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0'); }, 1000);
  })();

  function report(){ if (window.parent !== window) window.parent.postMessage({ source: 'maas-iframe-resize', height: document.body.scrollHeight }, '*'); }
  window.addEventListener('load', function(){ applyInit({}); report(); });
</script>
</body>
</html>

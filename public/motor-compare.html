<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motor — Compare Plans</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f6f7; color: #16242b; -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'Space Grotesk', monospace; }
  svg { display: block; }
  button { font-family: inherit; }
  .softcard { background: #fff; border-radius: 20px; border: 1px solid #eef0f1; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 40px; }
  .yes { color: #00a878; }
  .no { color: #c9ccd1; }
  .matrix > div { display: grid; }
  @media (max-width: 560px) { .wrap { padding: 0 16px; } h1 { font-size: 23px !important; } }
</style>
</head>
<body>
<div class="wrap">
  <div style="padding: 28px 0 120px;">
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
      <span id="backLink" class="mono" style="font-size: 13px; color: #5b6578; cursor: pointer;">← Back to quotes</span>
    </div>
    <div style="margin-bottom: 24px;">
      <h1 style="font-size: 30px; font-weight: 700; letter-spacing: -0.02em;">Compare plans side by side</h1>
      <p style="font-size: 15px; color: #6b7780; margin-top: 8px;">Your Toyota RAV4 2022 · the cover features that matter, lined up.</p>
    </div>
    <div class="softcard matrix" id="matrix" style="overflow: hidden;"></div>
  </div>
</div>

<script src="/flow-config.js"></script>
<script>
  var plans = [
    { name: 'ICEA Lion', plan: 'Simba Motor', initials: 'IL', logoBg: '#f5f7f8', logoColor: '#023448',
      price: '542,000', cover: 'Comprehensive', sum: '38.0M', tpl: '50M', ownDamage: true, theft: true, windscreen: true, roadside: true, garages: '120+', pa: true, cashback: true, rating: '4.7', claims: '96%', payout: '7 days' },
    { name: 'Britam', plan: 'Motor Insurance', initials: 'BR', logoBg: '#f3f8d6', logoColor: '#5a6a00',
      price: '485,000', cover: 'Comprehensive', sum: '36.0M', tpl: '50M', ownDamage: true, theft: true, windscreen: true, roadside: false, garages: '90+', pa: true, cashback: true, rating: '4.5', claims: '94%', payout: '9 days' },
    { name: 'Old Mutual', plan: 'Car Insurance', initials: 'OM', logoBg: '#f5f7f8', logoColor: '#023448',
      price: '720,000', cover: 'Comprehensive', sum: '40.0M', tpl: '75M', ownDamage: true, theft: true, windscreen: false, roadside: true, garages: '150+', pa: true, cashback: false, rating: '4.6', claims: '95%', payout: '5 days' }
  ];
  var features = [
    { label: 'Annual premium', type: 'price' },
    { label: 'Cover type', key: 'cover', type: 'text' },
    { label: 'Sum insured', key: 'sum', type: 'cur' },
    { label: 'Third-party liability', key: 'tpl', type: 'cur' },
    { label: 'Own damage', key: 'ownDamage', type: 'bool' },
    { label: 'Theft & fire', key: 'theft', type: 'bool' },
    { label: 'Windscreen cover', key: 'windscreen', type: 'bool' },
    { label: '24/7 roadside assist', key: 'roadside', type: 'bool' },
    { label: 'Cashless garages', key: 'garages', type: 'text' },
    { label: 'Personal accident', key: 'pa', type: 'bool' },
    { label: 'Ecobank cashback', key: 'cashback', type: 'bool' },
    { label: 'Customer rating', key: 'rating', type: 'text' },
    { label: 'Claims paid', key: 'claims', type: 'good' },
    { label: 'Avg. payout time', key: 'payout', type: 'text' }
  ];

  var selected = [0, 1, 2];
  var CHECK = '<span class="yes"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>';
  var CROSS = '<span class="no"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></span>';

  function cur() { return (window.MAAS ? window.MAAS.currency() : 'UGX'); }

  function cell(extra) { return 'padding: 14px 18px; border-left: 1px solid #eef0f1; border-bottom: 1px solid #f1f4f5; display: flex; align-items: center; justify-content: center; ' + (extra || ''); }
  function labelCell() { return 'padding: 16px 24px; background: #fafbfc; border-bottom: 1px solid #f1f4f5; display: flex; align-items: center; font-size: 13px; font-weight: 600;'; }

  function render() {
    var cols = selected.map(function (i) { return plans[i]; });
    var gridCols = 'minmax(150px, 1.1fr) ' + cols.map(function () { return '1fr'; }).join(' ');
    var html = '';

    // header row
    html += '<div style="grid-template-columns:' + gridCols + ';">';
    html += '<div style="padding: 24px; border-bottom: 1px solid #eef0f1; display: flex; align-items: flex-end;"><span class="mono" style="font-size: 11px; color: #9aa6ad; letter-spacing: 0.08em;">PLAN</span></div>';
    cols.forEach(function (p, ci) {
      html += '<div style="padding: 22px 18px; border-left: 1px solid #eef0f1; border-bottom: 1px solid #eef0f1; text-align: center; position: relative;">';
      if (selected.length > 2) {
        html += '<button data-remove="' + ci + '" title="Remove" style="position:absolute; top:8px; right:8px; width:22px; height:22px; border:none; border-radius:999px; background:#f1f4f5; color:#9aa6ad; cursor:pointer; line-height:1;">×</button>';
      }
      html += '<div class="mono" style="width: 52px; height: 52px; border-radius: 14px; background: ' + p.logoBg + '; color: ' + p.logoColor + '; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; margin: 0 auto;">' + p.initials + '</div>';
      html += '<div style="font-size: 16px; font-weight: 700; margin-top: 12px;">' + p.name + '</div>';
      html += '<div class="mono" style="font-size: 11px; color: #9aa6ad; margin-top: 2px;">' + p.plan + '</div>';
      html += '</div>';
    });
    html += '</div>';

    // feature rows
    features.forEach(function (f) {
      html += '<div style="grid-template-columns:' + gridCols + ';">';
      html += '<div style="' + labelCell() + '">' + f.label + '</div>';
      cols.forEach(function (p) {
        var v = '';
        if (f.type === 'price') v = '<span style="font-size: 20px; font-weight: 800; color: #023448;">' + cur() + ' ' + p.price + '</span>';
        else if (f.type === 'cur') v = '<span style="font-size: 14px; font-weight: 600;">' + cur() + ' ' + p[f.key] + '</span>';
        else if (f.type === 'bool') v = p[f.key] ? CHECK : CROSS;
        else if (f.type === 'good') v = '<span style="font-size: 14px; font-weight: 700; color: #00a878;">' + p[f.key] + '</span>';
        else v = '<span style="font-size: 14px; font-weight: 600;">' + p[f.key] + '</span>';
        html += '<div style="' + cell() + '">' + v + '</div>';
      });
      html += '</div>';
    });

    // buy row
    html += '<div style="grid-template-columns:' + gridCols + ';">';
    html += '<div style="padding: 20px 24px;"></div>';
    cols.forEach(function (p) {
      html += '<div style="padding: 18px; border-left: 1px solid #eef0f1; display: flex; align-items: center; justify-content: center;"><button data-buy="' + p.name + '" style="border: none; background: #BED600; color: #023448; padding: 12px 0; width: 100%; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer;">Buy plan →</button></div>';
    });
    html += '</div>';

    document.getElementById('matrix').innerHTML = html;
    bind();
    reportHeight();
  }

  function post(action, data) {
    if (window.parent !== window) window.parent.postMessage(Object.assign({ source: 'maas-motor-compare', action: action }, data || {}), '*');
  }
  function bind() {
    document.querySelectorAll('[data-buy]').forEach(function (b) { b.onclick = function () { post('buy', { provider: b.getAttribute('data-buy') }); }; });
    document.querySelectorAll('[data-remove]').forEach(function (b) {
      b.onclick = function () {
        var ci = parseInt(b.getAttribute('data-remove'));
        selected.splice(ci, 1);
        if (selected.length < 2) { post('back'); return; }
        render();
      };
    });
  }
  document.getElementById('backLink').addEventListener('click', function () { post('back'); });

  window.addEventListener('message', function (e) {
    if (e.data && e.data.source === 'maas-compare-init' && Array.isArray(e.data.selectedIndices) && e.data.selectedIndices.length) {
      selected = e.data.selectedIndices.slice();
      render();
    }
  });

  function reportHeight() {
    if (window.parent !== window) window.parent.postMessage({ source: 'maas-iframe-resize', height: document.body.scrollHeight + 40 }, '*');
  }
  window.addEventListener('load', function () { render(); });
  window.addEventListener('resize', reportHeight);
  render();
</script>
</body>
</html>
